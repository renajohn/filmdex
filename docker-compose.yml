services:
  dexvault:
    image: ghcr.io/renajohn/filmdex:latest
    ports:
      - "8051:3001"
    volumes:
      - dexvault_data:/data
    environment:
      - NODE_ENV=production
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - homepage.group=Apps
      - homepage.name=DexVault
      - homepage.href=http://p-cloud.local:8051
      - homepage.icon=logo192.png
volumes:
  dexvault_data:  