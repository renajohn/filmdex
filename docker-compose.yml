services:
  dexvault:
    image: ghcr.io/renajohn/filmdex:latest
    volumes:
      - dexvault_data:/data
    networks:
      - web
    environment:
      - NODE_ENV=production
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.dexvault.rule=Host(`dexvault.lab.crog.org`)"
      - "traefik.http.routers.dexvault.entrypoints=websecure"
      - "traefik.http.routers.dexvault.tls=true"
      - "traefik.http.services.dexvault.loadbalancer.server.port=3001"
      # MCP server: separate router on its own subdomain. The client talks to
      # https://dexvault-mcp.lab.crog.org/ (root) and the addprefix middleware
      # rewrites the path so the backend receives POST /mcp.
      - "traefik.http.routers.dexvault-mcp.rule=Host(`dexvault-mcp.lab.crog.org`)"
      - "traefik.http.routers.dexvault-mcp.entrypoints=websecure"
      - "traefik.http.routers.dexvault-mcp.tls=true"
      - "traefik.http.routers.dexvault-mcp.service=dexvault"
      - "traefik.http.routers.dexvault-mcp.middlewares=dexvault-mcp-prefix"
      - "traefik.http.middlewares.dexvault-mcp-prefix.addprefix.prefix=/mcp"
      - homepage.group=Apps
      - homepage.name=DexVault
      - homepage.href=https://dexvault.lab.crog.org
      - homepage.icon=https://dexvault.lab.crog.org/logo192.png
      - homepage.description=Gestion de collection de films, musique et livres
volumes:
  dexvault_data:

networks:
  web:
    external: true
