<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Rounded dark background -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- Three stacked media spines (film, vinyl, book) -->
  <!-- Book spine -->
  <rect x="7" y="8" width="4" height="17" rx="1" fill="url(#gold)" opacity="0.6"/>
  <!-- Disc case spine -->
  <rect x="12.5" y="6" width="4" height="19" rx="1" fill="url(#gold)" opacity="0.8"/>
  <!-- Film case spine -->
  <rect x="18" y="9" width="4" height="16" rx="1" fill="url(#gold)" opacity="1"/>

  <!-- Small "D" letter hint at bottom -->
  <text x="16" y="29.5" text-anchor="middle" font-family="Georgia,serif" font-size="5" font-weight="bold" fill="#fbbf24" opacity="0.5">DV</text>
</svg>
