name: Publish Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.vscode/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get version
        id: version
        run: echo "version=$(node scripts/get-version.js)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/renajohn/filmdex:latest
            ghcr.io/renajohn/filmdex:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
